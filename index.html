<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>序章之家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 浮动背景爱心 -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="page-wrapper">
    <!-- Hello Kitty 头部 -->
    <div class="kitty-head">
      <svg viewBox="0 0 200 160" xmlns="http://www.w3.org/2000/svg">
        <!-- 左耳 -->
        <ellipse cx="55" cy="35" rx="28" ry="32" fill="white" stroke="#333" stroke-width="3" transform="rotate(-20 55 35)"/>
        <!-- 右耳 -->
        <ellipse cx="145" cy="35" rx="28" ry="32" fill="white" stroke="#333" stroke-width="3" transform="rotate(20 145 35)"/>
        <!-- 脸 -->
        <ellipse cx="100" cy="95" rx="85" ry="60" fill="white" stroke="#333" stroke-width="3"/>
        <!-- 左眼 -->
        <ellipse cx="70" cy="90" rx="7" ry="10" fill="#333"/>
        <!-- 右眼 -->
        <ellipse cx="130" cy="90" rx="7" ry="10" fill="#333"/>
        <!-- 鼻子 -->
        <ellipse cx="100" cy="102" rx="9" ry="6" fill="#FFD700" stroke="#333" stroke-width="1.5"/>
        <!-- 左胡须 -->
        <line x1="20" y1="82" x2="55" y2="88" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="18" y1="95" x2="55" y2="95" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="20" y1="108" x2="55" y2="102" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 右胡须 -->
        <line x1="180" y1="82" x2="145" y2="88" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="182" y1="95" x2="145" y2="95" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="180" y1="108" x2="145" y2="102" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
        <!-- 蝴蝶结（左耳） -->
        <g transform="translate(135, 25)">
          <ellipse cx="0" cy="0" rx="18" ry="14" fill="#FF3366" stroke="#333" stroke-width="2" transform="rotate(-30)"/>
          <ellipse cx="22" cy="0" rx="18" ry="14" fill="#FF3366" stroke="#333" stroke-width="2" transform="rotate(30)"/>
          <circle cx="11" cy="0" r="9" fill="#FF3366" stroke="#333" stroke-width="2"/>
          <!-- 蝴蝶结褶皱 -->
          <path d="M 2 -5 Q 8 -2 2 5" stroke="#CC1144" stroke-width="1.5" fill="none"/>
          <path d="M 20 -5 Q 14 -2 20 5" stroke="#CC1144" stroke-width="1.5" fill="none"/>
        </g>
      </svg>
    </div>

    <header class="site-header">
      <div class="header-bow">
        <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="15" cy="20" rx="14" ry="10" fill="#FF3366" stroke="#333" stroke-width="2" transform="rotate(-20 15 20)"/>
          <ellipse cx="45" cy="20" rx="14" ry="10" fill="#FF3366" stroke="#333" stroke-width="2" transform="rotate(20 45 20)"/>
          <circle cx="30" cy="20" r="8" fill="#FF3366" stroke="#333" stroke-width="2"/>
        </svg>
      </div>
      <h1 class="site-title">序章之家</h1>
      <p class="site-subtitle" id="siteSubtitle">我们的故事，从这里开始</p>
      <div class="header-decoration">
        <span class="heart-icon">🎀</span>
        <span class="heart-icon">💖</span>
        <span class="heart-icon">🎀</span>
      </div>
    </header>

    <main id="app">
      <div class="loading">
        <div class="loading-kitty">
          <svg viewBox="0 0 80 64" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="22" cy="14" rx="11" ry="13" fill="white" stroke="#FF3366" stroke-width="2" transform="rotate(-20 22 14)"/>
            <ellipse cx="58" cy="14" rx="11" ry="13" fill="white" stroke="#FF3366" stroke-width="2" transform="rotate(20 58 14)"/>
            <ellipse cx="40" cy="38" rx="34" ry="24" fill="white" stroke="#FF3366" stroke-width="2"/>
            <ellipse cx="28" cy="36" rx="3" ry="4" fill="#FF3366"/>
            <ellipse cx="52" cy="36" rx="3" ry="4" fill="#FF3366"/>
            <ellipse cx="40" cy="41" rx="4" ry="2.5" fill="#FFD700" stroke="#FF3366" stroke-width="1"/>
            <circle cx="54" cy="10" r="5" fill="#FF3366" stroke="#FF3366" stroke-width="1"/>
          </svg>
        </div>
        <p>加载中...</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-kitty">
        <svg viewBox="0 0 60 48" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="17" cy="11" rx="8" ry="10" fill="white" stroke="#FF3366" stroke-width="1.5" transform="rotate(-20 17 11)"/>
          <ellipse cx="43" cy="11" rx="8" ry="10" fill="white" stroke="#FF3366" stroke-width="1.5" transform="rotate(20 43 11)"/>
          <ellipse cx="30" cy="29" rx="25" ry="18" fill="white" stroke="#FF3366" stroke-width="1.5"/>
          <ellipse cx="21" cy="27" rx="2" ry="3" fill="#FF3366"/>
          <ellipse cx="39" cy="27" rx="2" ry="3" fill="#FF3366"/>
          <ellipse cx="30" cy="31" rx="3" ry="2" fill="#FFD700" stroke="#FF3366" stroke-width="0.8"/>
          <circle cx="41" cy="8" r="4" fill="#FF3366"/>
        </svg>
      </div>
      <p>Made with 💕 for you</p>
      <p class="footer-note">从2026.3.27开始，我们要相约过一辈子</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
