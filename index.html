<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>序章之家</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 浮动背景爱心 -->
  <div class="floating-hearts" id="floatingHearts"></div>

  <div class="page-wrapper">
    <!-- 猫耳朵装饰 -->
    <div class="kitty-ears">
      <div class="ear left"><div class="ear-inner"></div></div>
      <div class="ear right"><div class="ear-inner"></div></div>
    </div>

    <header class="site-header">
      <div class="header-bow">
        <div class="bow-loop left"></div>
        <div class="bow-loop right"></div>
        <div class="bow-knot"></div>
      </div>
      <h1 class="site-title">序章之家</h1>
      <p class="site-subtitle" id="siteSubtitle">我们的故事，从这里开始</p>
      <div class="header-decoration">
        <span class="heart-icon">🎀</span>
        <span class="heart-icon">💖</span>
        <span class="heart-icon">🎀</span>
      </div>
    </header>

    <main id="app">
      <!-- 内容由 JS 动态渲染 -->
      <div class="loading">
        <div class="loading-bow">
          <div class="bow-loop left"></div>
          <div class="bow-loop right"></div>
          <div class="bow-knot"></div>
        </div>
        <p>加载中...</p>
      </div>
    </main>

    <footer class="site-footer">
      <div class="footer-bow">🎀</div>
      <p>Made with 💕 for you</p>
      <p class="footer-note">从2026.3.27开始，我们要相约过一辈子</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
